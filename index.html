<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ArcShield</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:#020b14;
}

/* =========================
   APP
========================= */

.app{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* =========================
   PAGE BASE
========================= */

.page{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* =========================
   PAGE FUNDO
========================= */

.second-page{

  background:
    linear-gradient(180deg,#020d18 0%, #07192a 100%);

  overflow:hidden;
}

/* GRID */

.second-page::before{
  content:"";
  position:absolute;
  inset:0;

  background-image:
    linear-gradient(rgba(0,180,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,180,255,.05) 1px, transparent 1px);

  background-size:40px 40px;

  opacity:.32;
}

/* GLOW */

.second-page::after{
  content:"";

  position:absolute;

  width:700px;
  height:700px;

  border-radius:50%;

  background:#0cc7ff10;

  filter:blur(130px);

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);
}

.second-placeholder{
  position:absolute;

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  color:#4ca9d6;

  font-size:15px;
  letter-spacing:7px;

  opacity:.22;
}

/* =========================
   CAPA
========================= */

.cover-page{

  background:
    radial-gradient(circle at top, #8fe6ff55 0%, transparent 38%),
    linear-gradient(180deg,#31b0ec 0%, #2399d6 100%);

  display:flex;
  align-items:center;
  justify-content:center;

  z-index:5;

  transition:transform .75s cubic-bezier(.77,0,.18,1);

  overflow:hidden;
}

/* GLOW CENTRAL */

.cover-page::before{
  content:"";

  position:absolute;

  width:520px;
  height:520px;

  border-radius:50%;

  background:#b5f0ff22;

  filter:blur(120px);

  top:20%;
  left:50%;

  transform:translateX(-50%);
}

/* =========================
   BOTÃO
========================= */

.slide-btn{

  position:absolute;

  top:70px;
  left:50%;

  transform:translateX(-50%);

  width:74px;
  height:74px;

  border-radius:50%;

  background:rgba(255,255,255,.10);

  border:1px solid rgba(255,255,255,.14);

  backdrop-filter:blur(14px);

  display:flex;
  align-items:center;
  justify-content:center;

  color:white;
  font-size:32px;

  cursor:pointer;

  z-index:20;

  transition:.2s;

  box-shadow:
    0 0 35px rgba(0,200,255,.22),
    inset 0 0 25px rgba(255,255,255,.04);
}

.slide-btn:active{
  transform:translateX(-50%) scale(.93);
}

/* =========================
   CENTRO
========================= */

.center-box{
  position:relative;
  z-index:10;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* =========================
   LOGO
========================= */

.logo-box{

  width:170px;
  height:170px;

  border-radius:38px;

  background:rgba(255,255,255,.08);

  border:1px solid rgba(255,255,255,.16);

  backdrop-filter:blur(14px);

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:
    0 0 50px rgba(0,225,255,.18),
    inset 0 0 30px rgba(255,255,255,.05);
}

.logo-box img{
  width:120px;
  object-fit:contain;
}

/* =========================
   TITULO
========================= */

.title{

  margin-top:26px;

  color:white;

  font-size:42px;
  font-weight:700;

  letter-spacing:5px;

  text-shadow:
    0 0 20px rgba(255,255,255,.18),
    0 0 35px rgba(0,225,255,.35);
}

.sub{

  margin-top:12px;

  color:#ecfbff;

  font-size:12px;

  letter-spacing:4px;

  opacity:.72;
}

/* =========================
   ABRIR
========================= */

.app.open .cover-page{
  transform:translateX(-100%);
}

/* =========================
   DESKTOP
========================= */

@media (min-width:900px){

  .app{
    width:100vw;
    height:100vh;
    max-width:none;
    margin:0;
    border:none;
  }

  .center-box{
    transform:scale(1.15);
  }

  .logo-box{
    width:190px;
    height:190px;
    border-radius:42px;
  }

  .logo-box img{
    width:135px;
  }

  .title{
    font-size:52px;
    letter-spacing:6px;
  }

  .sub{
    font-size:14px;
    letter-spacing:5px;
  }

}

</style>
</head>

<body>

<div class="app" id="app">

  <!-- PAGINA DE BAIXO -->

  <section class="page second-page">

      <div class="second-placeholder">
        SECOND PAGE
      </div>

  </section>

  <!-- CAPA SOBREPOSTA -->

  <section class="page cover-page">

      <div class="slide-btn" onclick="togglePages()">
        ➜
      </div>

      <div class="center-box">

          <div class="logo-box">
            <img src="logo.png" alt="ArcShield Logo">
          </div>

          <div class="title">
            ARCSHIELD
          </div>

          <div class="sub">
            SECURITY • DEFENSE • ARC
          </div>

      </div>

  </section>

</div>

<script>

const app = document.getElementById("app");

let opened = false;

function togglePages(){

  opened = !opened;

  if(opened){
    app.classList.add("open");
  }else{
    app.classList.remove("open");
  }

}

/* =========================
   SWIPE
========================= */

let startX = 0;

document.addEventListener("touchstart",(e)=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",(e)=>{

  let endX = e.changedTouches[0].clientX;

  let diff = startX - endX;

  if(diff > 70){
    app.classList.add("open");
    opened = true;
  }

  if(diff < -70){
    app.classList.remove("open");
    opened = false;
  }

});

</script>

</body>
</html>
