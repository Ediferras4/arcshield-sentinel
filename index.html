<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ArcShield</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:#020816;
}

/* =========================
   APP
========================= */

.app{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* =========================
   BASE PAGE
========================= */

.page{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* =========================
   PAGE 2
========================= */

.second-page{

  background:
    linear-gradient(180deg,#020b16 0%, #07192c 100%);

  overflow:hidden;
}

/* grid */

.second-page::before{
  content:"";

  position:absolute;
  inset:0;

  background-image:
    linear-gradient(rgba(0,180,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,180,255,.04) 1px, transparent 1px);

  background-size:44px 44px;

  opacity:.25;
}

/* =========================
   CAPA
========================= */

.cover-page{

  background:
    radial-gradient(circle at center,
    #0f7cff 0%,
    #063a9d 55%,
    #02122f 100%);

  overflow:hidden;

  display:flex;
  align-items:center;
  justify-content:center;

  z-index:20;

  transition:transform .85s cubic-bezier(.77,0,.18,1);
}

/* hex background */

.cover-page::before{
  content:"";

  position:absolute;
  inset:0;

  background-image:url("https://www.transparenttextures.com/patterns/hexellence.png");

  opacity:.08;
}

/* glow */

.cover-page::after{
  content:"";

  position:absolute;

  width:900px;
  height:900px;

  border-radius:50%;

  background:#00bfff18;

  filter:blur(120px);

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);
}

/* =========================
   OPEN BUTTON
========================= */

.open-button{

  position:absolute;

  top:82px;
  left:50%;

  transform:translateX(-50%);

  width:96px;
  height:96px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    radial-gradient(circle at top,
    rgba(255,255,255,.16),
    rgba(255,255,255,.04));

  border:2px solid rgba(83,220,255,.45);

  backdrop-filter:blur(10px);

  box-shadow:
    0 0 25px rgba(0,195,255,.35),
    0 0 60px rgba(0,195,255,.18),
    inset 0 0 20px rgba(255,255,255,.05);

  z-index:50;

  cursor:pointer;

  transition:.25s;
}

.open-button:active{
  transform:translateX(-50%) scale(.95);
}

/* outer ring */

.open-button::before{
  content:"";

  position:absolute;

  width:120%;
  height:120%;

  border-radius:50%;

  border:1px solid rgba(0,225,255,.22);
}

/* arrow */

.arrow{
  font-size:48px;
  color:#dffbff;

  transform:translateX(3px);

  text-shadow:
    0 0 15px rgba(255,255,255,.35),
    0 0 35px rgba(0,225,255,.45);
}

/* =========================
   CENTER
========================= */

.center-box{
  position:relative;
  z-index:30;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* =========================
   SHIELD AREA
========================= */

.shield-wrap{

  position:relative;

  width:440px;
  height:440px;

  display:flex;
  align-items:center;
  justify-content:center;
}

/* radar ring */

.ring{
  position:absolute;

  width:100%;
  height:100%;

  border-radius:50%;

  border:1px solid rgba(0,225,255,.15);
}

.ring::before{
  content:"";

  position:absolute;

  inset:28px;

  border-radius:50%;

  border:1px solid rgba(0,225,255,.10);
}

/* logo */

.logo{

  width:290px;

  object-fit:contain;

  filter:
    drop-shadow(0 0 22px rgba(0,225,255,.65))
    drop-shadow(0 0 80px rgba(0,180,255,.30));
}

/* =========================
   TITLE
========================= */

.title{

  margin-top:10px;

  font-size:82px;
  font-weight:800;

  letter-spacing:10px;

  background:linear-gradient(180deg,#c9f7ff 0%, #44bfff 100%);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 20px rgba(255,255,255,.08),
    0 0 40px rgba(0,225,255,.25);
}

/* =========================
   SUB
========================= */

.sub{

  margin-top:18px;

  color:#4ed0ff;

  font-size:18px;

  letter-spacing:10px;

  text-shadow:
    0 0 15px rgba(0,225,255,.15);
}

/* divider */

.line{

  width:420px;
  height:2px;

  margin-top:28px;

  background:
    linear-gradient(90deg,
    transparent,
    rgba(0,225,255,.7),
    transparent);

  box-shadow:
    0 0 15px rgba(0,225,255,.25);
}

/* =========================
   OPEN
========================= */

.app.open .cover-page{
  transform:translateX(-100%);
}

/* =========================
   MOBILE
========================= */

@media (max-width:700px){

  .open-button{
    width:78px;
    height:78px;
    top:70px;
  }

  .arrow{
    font-size:40px;
  }

  .shield-wrap{
    width:270px;
    height:270px;
  }

  .logo{
    width:185px;
  }

  .title{
    font-size:42px;
    letter-spacing:6px;
    margin-top:18px;
  }

  .sub{
    font-size:11px;
    letter-spacing:5px;
    margin-top:14px;
  }

  .line{
    width:240px;
    margin-top:22px;
  }

}

/* =========================
   SMALL MOBILE
========================= */

@media (max-width:390px){

  .title{
    font-size:36px;
  }

  .sub{
    letter-spacing:4px;
  }

}

</style>
</head>

<body>

<div class="app" id="app">

  <!-- PAGE 2 -->

  <section class="page second-page"></section>

  <!-- CAPA -->

  <section class="page cover-page">

      <!-- botão -->

      <div class="open-button" onclick="togglePages()">

          <div class="arrow">
            ➜
          </div>

      </div>

      <!-- centro -->

      <div class="center-box">

          <div class="shield-wrap">

              <div class="ring"></div>

              <!-- PNG TRANSPARENTE -->
              <img src="logo.png" class="logo" alt="ArcShield">

          </div>

          <div class="title">
            ARCSHIELD
          </div>

          <div class="sub">
            SECURITY • DEFENSE • ARC
          </div>

          <div class="line"></div>

      </div>

  </section>

</div>

<script>

const app = document.getElementById("app");

let opened = false;

function togglePages(){

  opened = !opened;

  if(opened){
    app.classList.add("open");
  }else{
    app.classList.remove("open");
  }

}

/* swipe */

let startX = 0;

document.addEventListener("touchstart",(e)=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",(e)=>{

  let endX = e.changedTouches[0].clientX;

  let diff = startX - endX;

  if(diff > 70){
    app.classList.add("open");
    opened = true;
  }

  if(diff < -70){
    app.classList.remove("open");
    opened = false;
  }

});

</script>

</body>
</html>
