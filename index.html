<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ArcShield</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:#020812;
}

/* =========================
   APP
========================= */

.app{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* =========================
   BASE PAGE
========================= */

.page{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* =========================
   PAGE 2
========================= */

.second-page{

  background:
    linear-gradient(180deg,#020c16 0%, #07192a 100%);

  overflow:hidden;
}

.second-page::before{
  content:"";

  position:absolute;
  inset:0;

  background-image:
    linear-gradient(rgba(0,180,255,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,180,255,.045) 1px, transparent 1px);

  background-size:42px 42px;

  opacity:.32;
}

.second-page::after{
  content:"";

  position:absolute;

  width:800px;
  height:800px;

  border-radius:50%;

  background:#00bfff12;

  filter:blur(140px);

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);
}

/* =========================
   CAPA
========================= */

.cover-page{

  background:
    radial-gradient(circle at top, #a9ebff44 0%, transparent 35%),
    linear-gradient(180deg,#37b7f2 0%, #269fdd 100%);

  display:flex;
  align-items:center;
  justify-content:center;

  overflow:hidden;

  z-index:10;

  transition:transform .85s cubic-bezier(.77,0,.18,1);
}

/* glow */

.cover-page::before{
  content:"";

  position:absolute;

  width:620px;
  height:620px;

  border-radius:50%;

  background:#ffffff12;

  filter:blur(130px);

  top:12%;
  left:50%;

  transform:translateX(-50%);
}

/* texture */

.cover-page::after{
  content:"";

  position:absolute;
  inset:0;

  background:
    linear-gradient(transparent 96%, rgba(255,255,255,.02) 100%);

  background-size:100% 4px;

  opacity:.18;
}

/* =========================
   BOTÃO ABRIR
========================= */

.slide-btn{

  position:absolute;

  top:72px;
  left:50%;

  transform:translateX(-50%);

  width:88px;
  height:88px;

  border-radius:50%;

  background:
    linear-gradient(180deg,
    rgba(255,255,255,.12),
    rgba(255,255,255,.04));

  border:1px solid rgba(255,255,255,.14);

  backdrop-filter:blur(14px);

  display:flex;
  align-items:center;
  justify-content:center;

  z-index:50;

  cursor:pointer;

  transition:.22s;

  box-shadow:
    0 0 45px rgba(0,210,255,.18),
    inset 0 0 24px rgba(255,255,255,.05);
}

.slide-btn:active{
  transform:translateX(-50%) scale(.94);
}

/* seta */

.arrow-wrap{
  position:relative;

  width:36px;
  height:36px;
}

.arrow-line{
  position:absolute;

  width:26px;
  height:6px;

  background:white;

  border-radius:20px;

  top:15px;
  left:2px;
}

.arrow-top{
  position:absolute;

  width:18px;
  height:6px;

  background:white;

  border-radius:20px;

  transform:rotate(45deg);

  right:1px;
  top:10px;
}

.arrow-bottom{
  position:absolute;

  width:18px;
  height:6px;

  background:white;

  border-radius:20px;

  transform:rotate(-45deg);

  right:1px;
  bottom:10px;
}

/* =========================
   CENTRO
========================= */

.center-box{
  position:relative;
  z-index:20;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  transform:translateY(10px);
}

/* =========================
   LOGO
========================= */

.logo-shell{

  width:240px;
  height:240px;

  border-radius:52px;

  position:relative;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    linear-gradient(180deg,
    rgba(255,255,255,.11),
    rgba(255,255,255,.03));

  border:1px solid rgba(255,255,255,.12);

  backdrop-filter:blur(16px);

  box-shadow:
    0 0 60px rgba(0,220,255,.18),
    inset 0 0 40px rgba(255,255,255,.04);
}

/* aura */

.logo-shell::before{
  content:"";

  position:absolute;

  width:130%;
  height:130%;

  border-radius:50%;

  background:#7fe8ff10;

  filter:blur(50px);

  z-index:-1;
}

/* logo */

.logo-shell img{

  width:165px;
  height:165px;

  object-fit:contain;

  filter:
    drop-shadow(0 0 18px rgba(255,255,255,.18));
}

/* =========================
   TITLES
========================= */

.title{

  margin-top:38px;

  color:white;

  font-size:64px;
  font-weight:800;

  letter-spacing:10px;

  text-shadow:
    0 0 24px rgba(255,255,255,.15),
    0 0 40px rgba(0,220,255,.20);
}

.sub{

  margin-top:18px;

  color:#eefcff;

  font-size:15px;

  letter-spacing:8px;

  opacity:.72;
}

/* =========================
   OPEN
========================= */

.app.open .cover-page{
  transform:translateX(-100%);
}

/* =========================
   MOBILE
========================= */

@media (max-width:700px){

  .slide-btn{
    width:74px;
    height:74px;
    top:60px;
  }

  .logo-shell{
    width:170px;
    height:170px;
    border-radius:40px;
  }

  .logo-shell img{
    width:120px;
    height:120px;
  }

  .title{
    font-size:34px;
    letter-spacing:5px;
    margin-top:28px;
  }

  .sub{
    font-size:11px;
    letter-spacing:5px;
    margin-top:14px;
  }

}

</style>
</head>

<body>

<div class="app" id="app">

  <!-- PAGE 2 -->

  <section class="page second-page"></section>

  <!-- CAPA -->

  <section class="page cover-page">

      <!-- botão -->

      <div class="slide-btn" onclick="togglePages()">

          <div class="arrow-wrap">

              <div class="arrow-line"></div>

              <div class="arrow-top"></div>

              <div class="arrow-bottom"></div>

          </div>

      </div>

      <!-- centro -->

      <div class="center-box">

          <div class="logo-shell">

              <!-- IMPORTANTE:
                   logo transparente PNG
                   sem fundo branco
              -->

              <img src="logo.png" alt="ArcShield Logo">

          </div>

          <div class="title">
            ARCSHIELD
          </div>

          <div class="sub">
            SECURITY • DEFENSE • ARC
          </div>

      </div>

  </section>

</div>

<script>

const app = document.getElementById("app");

let opened = false;

function togglePages(){

  opened = !opened;

  if(opened){
    app.classList.add("open");
  }else{
    app.classList.remove("open");
  }

}

/* swipe */

let startX = 0;

document.addEventListener("touchstart",(e)=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",(e)=>{

  let endX = e.changedTouches[0].clientX;

  let diff = startX - endX;

  if(diff > 70){
    app.classList.add("open");
    opened = true;
  }

  if(diff < -70){
    app.classList.remove("open");
    opened = false;
  }

});

</script>

</body>
</html>
