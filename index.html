<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ArcShield</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:#020816;
}

/* =========================
   APP
========================= */

.app{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* =========================
   BASE PAGE
========================= */

.page{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* =========================
   SECOND PAGE
========================= */

.second-page{

  background:
    linear-gradient(180deg,#020b16 0%, #07192c 100%);

  overflow:hidden;
}

/* tech grid */

.second-page::before{
  content:"";

  position:absolute;
  inset:0;

  background-image:
    linear-gradient(rgba(0,180,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,180,255,.04) 1px, transparent 1px);

  background-size:44px 44px;

  opacity:.22;
}

/* =========================
   COVER
========================= */

.cover-page{

  background:
    radial-gradient(circle at top,
    #1f8fff 0%,
    #0452c9 45%,
    #02173e 100%);

  overflow:hidden;

  display:flex;
  align-items:center;
  justify-content:center;

  z-index:20;

  transition:transform .85s cubic-bezier(.77,0,.18,1);
}

/* hex texture */

.cover-page::before{
  content:"";

  position:absolute;
  inset:0;

  background-image:url("https://www.transparenttextures.com/patterns/hexellence.png");

  opacity:.06;
}

/* ambient glow */

.cover-page::after{
  content:"";

  position:absolute;

  width:900px;
  height:900px;

  border-radius:50%;

  background:#00bfff12;

  filter:blur(120px);

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);
}

/* =========================
   OPEN BUTTON
========================= */

.open-button{

  position:absolute;

  top:72px;
  left:50%;

  transform:translateX(-50%);

  width:82px;
  height:82px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    linear-gradient(180deg,
    rgba(255,255,255,.10),
    rgba(255,255,255,.03));

  border:1px solid rgba(120,220,255,.24);

  backdrop-filter:blur(10px);

  box-shadow:
    0 0 25px rgba(0,195,255,.14),
    inset 0 0 20px rgba(255,255,255,.04);

  z-index:50;

  cursor:pointer;

  transition:.22s;
}

.open-button:active{
  transform:translateX(-50%) scale(.94);
}

/* outer ring */

.open-button::before{
  content:"";

  position:absolute;

  width:118%;
  height:118%;

  border-radius:50%;

  border:1px solid rgba(0,225,255,.12);
}

/* arrow */

.arrow{

  font-size:42px;

  color:#dff8ff;

  transform:translateX(2px);

  text-shadow:
    0 0 12px rgba(255,255,255,.18),
    0 0 22px rgba(0,180,255,.24);
}

/* =========================
   CENTER
========================= */

.center-box{
  position:relative;
  z-index:30;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* =========================
   SHIELD AREA
========================= */

.shield-wrap{

  position:relative;

  width:420px;
  height:420px;

  display:flex;
  align-items:center;
  justify-content:center;
}

/* subtle ring */

.ring{
  position:absolute;

  width:92%;
  height:92%;

  border-radius:50%;

  border:1px solid rgba(120,220,255,.10);

  backdrop-filter:blur(2px);
}

.ring::before{
  content:"";

  position:absolute;

  inset:28px;

  border-radius:50%;

  border:1px solid rgba(120,220,255,.06);
}

/* logo */

.logo{

  width:250px;

  object-fit:contain;

  filter:
    drop-shadow(0 0 12px rgba(80,220,255,.28))
    drop-shadow(0 0 30px rgba(0,120,255,.18));

  opacity:.96;
}

/* =========================
   TITLE
========================= */

.title{

  margin-top:26px;

  font-size:74px;
  font-weight:800;

  letter-spacing:8px;

  background:
    linear-gradient(180deg,
    #d8f7ff 0%,
    #79d6ff 45%,
    #36a9ff 100%);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 18px rgba(0,180,255,.14);
}

/* =========================
   SUB
========================= */

.sub{

  margin-top:16px;

  color:#74cfff;

  font-size:15px;

  letter-spacing:8px;

  opacity:.72;
}

/* divider */

.line{

  width:320px;
  height:2px;

  margin-top:26px;

  background:
    linear-gradient(90deg,
    transparent,
    rgba(0,225,255,.7),
    transparent);

  box-shadow:
    0 0 12px rgba(0,225,255,.15);
}

/* =========================
   OPEN
========================= */

.app.open .cover-page{
  transform:translateX(-100%);
}

/* =========================
   MOBILE
========================= */

@media (max-width:700px){

  .open-button{
    width:72px;
    height:72px;
    top:58px;
  }

  .arrow{
    font-size:36px;
  }

  .shield-wrap{
    width:260px;
    height:260px;
  }

  .logo{
    width:175px;
  }

  .title{
    font-size:42px;
    letter-spacing:5px;
    margin-top:18px;
  }

  .sub{
    font-size:11px;
    letter-spacing:5px;
    margin-top:14px;
  }

  .line{
    width:220px;
    margin-top:20px;
  }

}

/* =========================
   SMALL MOBILE
========================= */

@media (max-width:390px){

  .title{
    font-size:36px;
  }

  .sub{
    letter-spacing:4px;
  }

}

</style>
</head>

<body>

<div class="app" id="app">

  <!-- SECOND PAGE -->

  <section class="page second-page"></section>

  <!-- COVER -->

  <section class="page cover-page">

      <!-- BUTTON -->

      <div class="open-button" onclick="togglePages()">

          <div class="arrow">
            ➜
          </div>

      </div>

      <!-- CENTER -->

      <div class="center-box">

          <div class="shield-wrap">

              <div class="ring"></div>

              <!-- 
                IMPORTANTE:
                use um PNG transparente
                sem fundo branco
              -->

              <img src="logo.png" class="logo" alt="ArcShield">

          </div>

          <div class="title">
            ARCSHIELD
          </div>

          <div class="sub">
            SECURITY • DEFENSE • ARC
          </div>

          <div class="line"></div>

      </div>

  </section>

</div>

<script>

const app = document.getElementById("app");

let opened = false;

function togglePages(){

  opened = !opened;

  if(opened){
    app.classList.add("open");
  }else{
    app.classList.remove("open");
  }

}

/* swipe */

let startX = 0;

document.addEventListener("touchstart",(e)=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",(e)=>{

  let endX = e.changedTouches[0].clientX;

  let diff = startX - endX;

  if(diff > 70){
    app.classList.add("open");
    opened = true;
  }

  if(diff < -70){
    app.classList.remove("open");
    opened = false;
  }

});

</script>

</body>
</html>
