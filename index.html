<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ArcShield</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:#07131f;
}

/* =========================
   WRAPPER
========================= */

.wrapper{
  width:200vw;
  height:100vh;
  display:flex;
  transition:transform .65s cubic-bezier(.77,0,.18,1);
}

/* =========================
   PAGES
========================= */

.page{
  width:100vw;
  height:100vh;
  flex-shrink:0;
  position:relative;
  overflow:hidden;
}

/* =========================
   CAPA
========================= */

.cover{
  background:
    radial-gradient(circle at top, #34c8ff55 0%, transparent 45%),
    linear-gradient(180deg,#1596d8 0%, #168dca 100%);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* brilho suave */

.cover::before{
  content:"";
  position:absolute;
  width:420px;
  height:420px;
  background:#4ed6ff20;
  border-radius:50%;
  filter:blur(80px);
  top:25%;
  left:50%;
  transform:translateX(-50%);
}

/* =========================
   SETA
========================= */

.slide-button{
  position:absolute;
  top:90px;
  left:50%;
  transform:translateX(-50%);
  width:72px;
  height:72px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.18);

  background:rgba(255,255,255,.08);
  backdrop-filter:blur(12px);

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  transition:.25s;
  z-index:10;

  box-shadow:
    0 0 30px rgba(0,195,255,.25),
    inset 0 0 20px rgba(255,255,255,.05);
}

.slide-button:active{
  transform:translateX(-50%) scale(.94);
}

.arrow{
  font-size:34px;
  color:#dff8ff;
  margin-left:4px;
}

/* =========================
   CENTRO
========================= */

.center-box{
  position:relative;
  z-index:5;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* =========================
   LOGO
========================= */

.logo-wrap{
  width:170px;
  height:170px;
  border-radius:42px;

  background:rgba(255,255,255,.05);

  display:flex;
  align-items:center;
  justify-content:center;

  border:1px solid rgba(255,255,255,.14);

  backdrop-filter:blur(10px);

  box-shadow:
    0 0 50px rgba(0,225,255,.18),
    inset 0 0 30px rgba(255,255,255,.04);
}

.logo-wrap img{
  width:120px;
  object-fit:contain;
}

/* =========================
   TITLE
========================= */

.title{
  margin-top:28px;

  color:white;
  font-size:36px;
  font-weight:700;
  letter-spacing:4px;

  text-shadow:
    0 0 18px rgba(255,255,255,.15),
    0 0 30px rgba(0,225,255,.35);
}

.subtitle{
  margin-top:10px;

  color:#d9f6ff;
  font-size:13px;
  letter-spacing:3px;
  opacity:.75;
}

/* =========================
   SECOND PAGE
========================= */

.second{
  background:
    linear-gradient(180deg,#07131f 0%, #0c1f30 100%);
}

.second::before{
  content:"";
  position:absolute;
  inset:0;

  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);

  background-size:40px 40px;

  opacity:.25;
}

.placeholder{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);

  color:#6fcfff;
  font-size:20px;
  letter-spacing:3px;
  opacity:.4;
}

/* =========================
   BACK BUTTON
========================= */

.back-btn{
  position:absolute;
  top:90px;
  left:28px;

  width:58px;
  height:58px;

  border-radius:50%;

  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);

  display:flex;
  align-items:center;
  justify-content:center;

  color:white;
  font-size:28px;

  backdrop-filter:blur(10px);

  cursor:pointer;
}

.back-btn:active{
  transform:scale(.94);
}

</style>
</head>

<body>

<div class="wrapper" id="wrapper">

  <!-- =====================
       CAPA
  ====================== -->

  <section class="page cover">

      <div class="slide-button" onclick="openSecondPage()">
        <div class="arrow">➜</div>
      </div>

      <div class="center-box">

          <div class="logo-wrap">
              <img src="logo.png" alt="ArcShield Logo">
          </div>

          <div class="title">ARCSHIELD</div>

          <div class="subtitle">
            SECURITY • DEFENSE • ARC
          </div>

      </div>

  </section>

  <!-- =====================
       PAGE 2
  ====================== -->

  <section class="page second">

      <div class="back-btn" onclick="backToCover()">
        ←
      </div>

      <div class="placeholder">
        SECOND PAGE
      </div>

  </section>

</div>

<script>

const wrapper = document.getElementById("wrapper");

function openSecondPage(){
  wrapper.style.transform = "translateX(-100vw)";
}

function backToCover(){
  wrapper.style.transform = "translateX(0)";
}

/* swipe mobile */

let startX = 0;

document.addEventListener("touchstart",(e)=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",(e)=>{

  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if(diff > 80){
    openSecondPage();
  }

  if(diff < -80){
    backToCover();
  }

});

</script>

</body>
</html>
