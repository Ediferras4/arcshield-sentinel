<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ArcShield</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:#06111c;
}

/* =========================
   APP
========================= */

.app{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* =========================
   PAGE BASE
========================= */

.page{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* =========================
   PAGE 2 (FUNDO)
========================= */

.second-page{

  background:
    linear-gradient(180deg,#020d18 0%, #061a2b 100%);

  overflow:hidden;
}

.second-page::before{
  content:"";
  position:absolute;
  inset:0;

  background-image:
    linear-gradient(rgba(0,180,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,180,255,.05) 1px, transparent 1px);

  background-size:38px 38px;

  opacity:.35;
}

.second-page::after{
  content:"";
  position:absolute;

  width:500px;
  height:500px;

  border-radius:50%;

  background:#0cc7ff10;

  filter:blur(120px);

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);
}

.second-placeholder{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);

  color:#4ca9d6;
  letter-spacing:6px;
  font-size:14px;

  opacity:.25;
}

/* =========================
   CAPA AZUL
========================= */

.cover-page{

  background:
    radial-gradient(circle at top, #78dcff55 0%, transparent 35%),
    linear-gradient(180deg,#2aa7e2 0%, #2197d1 100%);

  display:flex;
  align-items:center;
  justify-content:center;

  z-index:5;

  transition:transform .75s cubic-bezier(.77,0,.18,1);
}

/* brilho */

.cover-page::before{
  content:"";

  position:absolute;

  width:420px;
  height:420px;

  border-radius:50%;

  background:#8ee6ff30;

  filter:blur(90px);

  top:25%;
  left:50%;

  transform:translateX(-50%);
}

/* =========================
   SETA
========================= */

.slide-btn{

  position:absolute;

  top:70px;
  left:50%;

  transform:translateX(-50%);

  width:72px;
  height:72px;

  border-radius:50%;

  border:1px solid rgba(255,255,255,.14);

  background:rgba(255,255,255,.08);

  backdrop-filter:blur(14px);

  display:flex;
  align-items:center;
  justify-content:center;

  color:white;
  font-size:30px;

  z-index:20;

  cursor:pointer;

  box-shadow:
    0 0 30px rgba(0,195,255,.25),
    inset 0 0 20px rgba(255,255,255,.05);

  transition:.2s;
}

.slide-btn:active{
  transform:translateX(-50%) scale(.94);
}

/* =========================
   CENTRO
========================= */

.center-box{
  position:relative;
  z-index:10;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* =========================
   LOGO
========================= */

.logo-box{

  width:150px;
  height:150px;

  border-radius:36px;

  background:rgba(255,255,255,.07);

  border:1px solid rgba(255,255,255,.15);

  backdrop-filter:blur(12px);

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:
    0 0 40px rgba(0,200,255,.18),
    inset 0 0 25px rgba(255,255,255,.05);
}

.logo-box img{
  width:105px;
  object-fit:contain;
}

/* =========================
   TITLE
========================= */

.title{
  margin-top:24px;

  color:white;

  font-size:38px;
  font-weight:700;

  letter-spacing:4px;

  text-shadow:
    0 0 20px rgba(255,255,255,.18),
    0 0 35px rgba(0,225,255,.35);
}

.sub{
  margin-top:10px;

  color:#e7f9ff;

  font-size:12px;

  letter-spacing:4px;

  opacity:.7;
}

/* =========================
   ESTADO ABERTO
========================= */

.app.open .cover-page{
  transform:translateX(-100%);
}

/* =========================
   DESKTOP
========================= */

@media (min-width:900px){

  .app{
    max-width:430px;
    margin:auto;
    border-left:1px solid rgba(255,255,255,.05);
    border-right:1px solid rgba(255,255,255,.05);
  }

}

</style>
</head>

<body>

<div class="app" id="app">

    <!-- PAGINA DE BAIXO -->
    <section class="page second-page">

        <div class="second-placeholder">
          SECOND PAGE
        </div>

    </section>

    <!-- CAPA SOBREPOSTA -->
    <section class="page cover-page">

        <div class="slide-btn" onclick="togglePages()">
          ➜
        </div>

        <div class="center-box">

            <div class="logo-box">
              <img src="logo.png" alt="logo">
            </div>

            <div class="title">
              ARCSHIELD
            </div>

            <div class="sub">
              SECURITY • DEFENSE • ARC
            </div>

        </div>

    </section>

</div>

<script>

const app = document.getElementById("app");

let opened = false;

function togglePages(){

  opened = !opened;

  if(opened){
    app.classList.add("open");
  }else{
    app.classList.remove("open");
  }

}

/* =========================
   SWIPE MOBILE
========================= */

let startX = 0;

document.addEventListener("touchstart",(e)=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",(e)=>{

  let endX = e.changedTouches[0].clientX;

  let diff = startX - endX;

  if(diff > 70){
    app.classList.add("open");
    opened = true;
  }

  if(diff < -70){
    app.classList.remove("open");
    opened = false;
  }

});

</script>

</body>
</html>
